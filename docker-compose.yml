
services:
  wordpress:
    image: wordpress:latest
    build: .
    container_name: block_acorn
    restart: always
    ports:
      - "8099:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DEBUG: 1
    volumes:
      - wordpress_data:/var/www/html
      - ./:/var/www/html/wp-content/plugins/acorn-block:cached
    depends_on:
      - db
    networks:
      - block_acorn

  db:
    image: mysql:8.0
    container_name: block_acorn_db
    restart: always
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - block_acorn
    
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - '8300:80'  # use 8300 instead of 8200
    container_name: block_acorn_pma
    restart: always
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: rootpassword
    networks:
      - block_acorn

volumes:
  wordpress_data:
  db_data:

networks:
  block_acorn: